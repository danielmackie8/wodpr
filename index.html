<style>*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#080808;--s1:#111;--s2:#181818;--s3:#242424;--border:#303030;--border2:#3a3a3a;--lime:#c8f135;--lime2:#9ec425;--limefaint:rgba(200,241,53,.08);--red:#ff4545;--blue:#4eb8ff;--orange:#ff9a3c;--green:#3cffa0;--purple:#c084fc;--text:#f0f0f0;--text2:#b0b0b0;--muted:#666;--subtle:#2a2a2a}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Syne',sans-serif;padding:0;margin:0}
body{display:flex;justify-content:center}
#app{width:100%;max-width:420px;display:flex;flex-direction:column;height:100%;background:var(--s1);position:relative;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:calc(12px + env(safe-area-inset-top)) 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--s1)}

.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:80px}
.scroll::-webkit-scrollbar{width:2px}
.scroll::-webkit-scrollbar-thumb{background:var(--subtle)}
.nav{position:absolute;bottom:0;left:0;right:0;display:flex;align-items:stretch;border-top:1px solid var(--border2);background:#161616;height:64px;z-index:10}
.nb{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:10px 0;cursor:pointer;flex:1;position:relative;transition:background .15s}
.nb:active{background:rgba(255,255,255,.04)}
.nb.on{background:rgba(200,241,53,.07)}
.nb.on::after{content:'';position:absolute;top:0;left:22%;right:22%;height:2px;background:var(--lime);border-radius:0 0 2px 2px}
.nb-icon{font-size:18px;line-height:1;color:var(--muted)}
.nb.on .nb-icon{color:var(--lime)}
.nb-lbl{font-size:9px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);font-weight:600}

.chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.c-ft{background:rgba(255,69,69,.15);color:var(--red)}.c-am{background:rgba(78,184,255,.15);color:var(--blue)}.c-em{background:rgba(255,154,60,.15);color:var(--orange)}.c-st{background:rgba(200,241,53,.15);color:var(--lime)}.c-wl{background:rgba(60,255,160,.12);color:var(--green)}
.sec-hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;border-top:1px solid var(--border);user-select:none;-webkit-user-select:none}
.sec-hdr:first-child{border-top:none}
.sec-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sec-name{font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:700;flex:1;color:var(--text2)}
.sec-fmt{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:1px}
.sec-arr{font-size:11px;color:var(--muted);transition:transform .18s;flex-shrink:0}
.sec-arr.open{transform:rotate(180deg)}
.sec-body{display:none;border-top:1px solid var(--border)}
.sec-body.open{display:block}
.sec-items{padding:10px 16px 4px}
.sec-item{padding:5px 0;font-family:'DM Mono',monospace;font-size:12px;color:var(--text2);line-height:1.65;border-bottom:1px solid rgba(255,255,255,.04)}
.sec-item:last-child{border-bottom:none}
.d-wu{background:#ff9a3c}.t-wu{color:#ff9a3c}.d-st{background:var(--lime)}.t-st{color:var(--lime)}.d-wl{background:var(--green)}.t-wl{color:var(--green)}.d-ft{background:var(--red)}.t-ft{color:var(--red)}.d-am{background:var(--blue)}.t-am{color:var(--blue)}.d-em{background:var(--orange)}.t-em{color:var(--orange)}.d-cr{background:var(--blue)}.t-cr{color:var(--blue)}.d-cd{background:var(--purple)}.t-cd{color:var(--purple)}
.done-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;background:rgba(60,255,160,.1);border:1px solid rgba(60,255,160,.2);border-radius:5px;font-size:10px;color:var(--green);flex-shrink:0;font-weight:600}

.cond-track{display:flex;flex-direction:column;gap:8px}
.score-inp{background:var(--s3);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:18px;outline:none;font-family:'DM Mono',monospace;-webkit-appearance:none;width:100%}

.rx-row{display:flex;gap:5px}
.rx-btn{padding:7px 12px;border-radius:8px;border:1px solid var(--border);background:var(--s3);color:var(--muted);font-size:11px;font-weight:700;cursor:pointer}
.rx-btn.on{border-color:var(--red);background:rgba(255,69,69,.1);color:var(--red)}
.core-inp{background:var(--s3);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:13px;outline:none;font-family:'Syne',sans-serif;width:100%;resize:none;-webkit-appearance:none}
.core-inp:focus{border-color:var(--blue)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px)}
.modal-box{background:#161616;border-radius:22px 22px 0 0;border:1px solid var(--border2);border-bottom:none;width:100%;max-width:420px;padding:22px 20px 38px;max-height:90vh;overflow-y:auto}

.modal-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.modal-title{font-family:'Bebas Neue',cursive;font-size:26px;letter-spacing:1px;color:var(--text)}

.plc-label{font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:4px;font-weight:600}

.plc-sub{font-size:11px;color:var(--muted);margin-top:3px}
.set-form{margin-bottom:10px;padding:10px 12px 12px;background:var(--s3);border-radius:10px;border:1px solid var(--border)}

.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}

.best-set-inp{text-align:center;padding:9px 0;font-family:'Bebas Neue',cursive;font-size:22px;color:var(--text);background:var(--s3);border:1px solid var(--border);border-radius:10px;outline:none;-webkit-appearance:none;width:68px;flex-shrink:0}
.best-set-inp:focus{border-color:var(--lime)}
.lift-pr-body{padding:0 16px 14px;border-top:1px solid var(--border)}
.pct-pills{display:flex;gap:5px;padding-top:12px}

.pct-pill-p{font-size:9px;color:var(--muted);letter-spacing:.5px;margin-bottom:3px;font-weight:700}
.pct-pill-kg{font-family:'Bebas Neue',cursive;font-size:20px;line-height:1;color:var(--text2)}
.hist-rows{margin-top:10px;border-top:1px solid var(--border);padding-top:10px}
.hist-row-lbl{font-size:9px;color:var(--muted);letter-spacing:1.5px;margin-bottom:6px;font-weight:700}
.hist-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.hist-row:last-child{border-bottom:none}
.hist-date{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;flex-shrink:0}
.hist-val{font-size:12px;font-family:'DM Mono',monospace;color:var(--text2);flex:1;text-align:center;padding:0 6px}
.hist-badge{font-size:10px;font-weight:700;flex-shrink:0}
.hist-badge.pr{color:var(--lime)}.hist-badge.pct{color:var(--muted)}
.inp{width:100%;background:var(--s3);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:14px;outline:none;font-family:'Syne',sans-serif;-webkit-appearance:none}

textarea.inp{resize:none}
.btn-lime{width:100%;background:var(--lime);color:#000;border:none;border-radius:12px;padding:14px;font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:2px;cursor:pointer}
.btn-lime:active{background:var(--lime2)}
.btn-ghost{background:var(--s3);color:var(--text2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;font-size:13px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:600}
.btn-back{background:transparent;color:var(--text2);border:1px solid var(--border);border-radius:10px;padding:7px 12px;font-size:12px;cursor:pointer;font-family:'Syne',sans-serif}
.hdr{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);padding:16px 16px 8px;font-weight:700}
.row{display:flex;gap:8px}
.pbar{height:3px;background:var(--subtle);border-radius:3px;overflow:hidden}
.pbar-fill{height:100%;border-radius:3px;background:var(--lime);transition:width .3s}
.pct-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pct-cell{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:14px 12px;text-align:center}
.pct-cell.hl{border-color:var(--lime);background:rgba(200,241,53,.05)}

.setting-row{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--border)}

.setting-sub{font-size:11px;color:var(--muted);margin-top:2px}

@keyframes prPop{0%{opacity:0;transform:scale(.6)}60%{transform:scale(1.2)}100%{opacity:1;transform:scale(1)}}

.rest-timer-btns{display:flex;border-bottom:1px solid var(--border)}
.rest-timer-btn{flex:1;padding:9px 0;text-align:center;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;border-right:1px solid var(--border);font-family:'Syne',sans-serif;letter-spacing:.5px}

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDvFhPHOKlF8QcGpU-SlWwnqrzGinK0U5M",
    authDomain: "wodpr-279f1.firebaseapp.com",
    projectId: "wodpr-279f1",
    storageBucket: "wodpr-279f1.firebasestorage.app",
    messagingSenderId: "513914797231",
    appId: "1:513914797231:web:d3fcaf5dc46b50fd81a85a"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  // Expose to global scope so the main script can use them
  window._fbAuth = auth;
  window._fbDb = db;
  window._fbProvider = provider;
  window._fbDoc = doc;
  window._fbSetDoc = setDoc;
  window._fbGetDoc = getDoc;
  window._fbSignIn = () => signInWithPopup(auth, provider);
  window._fbSignOut = () => signOut(auth);

  // Listen for auth state changes
  onAuthStateChanged(auth, async (user) => {
    window._fbUser = user || null;
    if (user) {
      // User signed in - load their cloud data
      try {
        const snap = await getDoc(doc(db, 'users', user.uid));
        if (snap.exists()) {
          const d = snap.data();
          if (window._applyCloudData) window._applyCloudData(d);
        }
      } catch(e) { console.error('Load error', e); }
    }
    // Update UI
    if (window._updateAuthUI) window._updateAuthUI();
  });
</script>

async function load(){
  // Always load localStorage first (instant, works offline)
  try{
    const v=localStorage.getItem('wodpr9');
    if(v){const d=JSON.parse(v);S.currentWod=d.currentWod??0;S.completedWods=d.completedWods||[];S.results=d.results||{};S.hist=d.hist||{};S.maxLifts=d.maxLifts||{};if(d.prs)Object.assign(S.prs,d.prs);}
  }catch(e){}
}

// Apply cloud data (called when Firebase auth resolves)
window._applyCloudData = function(d){
  if(!d)return;
  S.currentWod=d.currentWod??S.currentWod;
  S.completedWods=d.completedWods||S.completedWods;
  S.results=d.results||S.results;
  S.hist=d.hist||S.hist;
  S.maxLifts=d.maxLifts||S.maxLifts;
  if(d.prs)Object.assign(S.prs,d.prs);
  // Also update localStorage with cloud data
  localStorage.setItem('wodpr9',JSON.stringify({currentWod:S.currentWod,completedWods:S.completedWods,results:S.results,prs:S.prs,hist:S.hist,maxLifts:S.maxLifts}));
  render();
};
async function save(){
  const data={currentWod:S.currentWod,completedWods:S.completedWods,results:S.results,prs:S.prs,hist:S.hist,maxLifts:S.maxLifts};
  // Always save locally
  try{localStorage.setItem('wodpr9',JSON.stringify(data));}catch(e){}
  // Save to Firestore if signed in
  if(window._fbUser&&window._fbDb&&window._fbDoc&&window._fbSetDoc){
    try{
      await window._fbSetDoc(window._fbDoc(window._fbDb,'users',window._fbUser.uid),data);
    }catch(e){console.error('Firestore save error',e);}
  }
}

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function today(){const d=new Date();return String(d.getDate()).padStart(2,'0')+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+d.getFullYear();}
function rnd(kg){return Math.round(kg*2)/2;}
function epley(kg,reps){return reps===1?kg:rnd(kg*(1+reps/30));}
function ensureR(wn){if(!S.results[wn])S.results[wn]={sets:{},cond:{},core:{},notes:'',completedAt:'',extraSets:{}};return S.results[wn];}
function getCanon(name){if(!name)return null;const k=name.toLowerCase().trim();if(CANONICAL[k])return CANONICAL[k];for(const[a,b]of Object.entries(CANONICAL))if(k.includes(a))return b;return null;}
function chipC(t){return{ft:'c-ft',am:'c-am',em:'c-em',st:'c-st',wl:'c-wl'}[t]||'c-st';}
function chipL(t){return{ft:'FOR TIME',am:'AMRAP',em:'EMOM',st:'STRENGTH',wl:'WEIGHTLIFTING'}[t]||'WOD';}

function showPRModal(liftName){S.modal={type:'pr',liftName};renderModal();}
function openSetModal(wn,si,bi,tappedIdx,liftName){
  const w=WORKOUTS.find(x=>x.n===wn);if(!w)return;
  const sec=w.sections[si];if(!sec)return;
  const r=S.results[wn]||{};
  const setLines=sec.lines.filter(l=>/\d+\s*(reps?|steps?|sets?|%)/i.test(l));
  const extraKey='extra-'+si+'-'+bi;
  const extraCount=parseInt(((r.extraSets)||{})[extraKey])||0;
  const allLabels=[...setLines];
  for(let ex=0;ex<extraCount;ex++)allLabels.push('Extra set '+(ex+1));
  const allSets=allLabels.map((lbl,i)=>({sk:si+'-'+bi+'-'+i,lbl}));
  S.modal={type:'log',wn,sk:si+'-'+bi+'-'+tappedIdx,lbl:allLabels[tappedIdx]||'Set',liftName,allSets};
  renderModal();
}
function closeModal(){
  S.modal=null;
  // Stop any running timer
  if(window._restTimer){clearInterval(window._restTimer);window._restTimer=null;}
  renderModal();
}

// Rest timer state
window._restSecs=120; // default 2 min
window._restRemaining=0;
window._restTimer=null;
window._restRunning=false;

function setRestDuration(secs){
  // Stop current timer if running
  if(window._restTimer){clearInterval(window._restTimer);window._restTimer=null;}
  window._restRunning=false;
  window._restSecs=secs;
  window._restRemaining=secs;
  updateTimerDisplay();
  // Update button states
  document.querySelectorAll('.rest-timer-btn').forEach(function(b){
    b.classList.toggle('active', parseInt(b.dataset.secs)===secs);
  });
}

function startRestTimer(){
  if(window._restRunning){
    // Pause/reset
    clearInterval(window._restTimer);window._restTimer=null;
    window._restRunning=false;
    window._restRemaining=window._restSecs;
    updateTimerDisplay();
    return;
  }
  if(window._restRemaining<=0)window._restRemaining=window._restSecs;
  window._restRunning=true;
  updateTimerDisplay();
  window._restTimer=setInterval(function(){
    window._restRemaining--;
    updateTimerDisplay();
    if(window._restRemaining<=0){
      clearInterval(window._restTimer);window._restTimer=null;
      window._restRunning=false;
      // Vibrate if supported
      if(navigator.vibrate)navigator.vibrate([200,100,200]);
      updateTimerDisplay();
    }
  },1000);
}

function autoStartTimer(){
  // Called when a weight is entered - start timer if not already running
  if(!window._restRunning&&window._restRemaining===0||window._restRemaining===window._restSecs){
    window._restRemaining=window._restSecs;
    startRestTimer();
  }
}

function updateTimerDisplay(){
  const el=document.getElementById('rest-timer-clock');
  const btn=document.getElementById('rest-timer-startbtn');
  if(!el||!btn)return;
  const mins=Math.floor(window._restRemaining/60);
  const secs=window._restRemaining%60;

}

  // Build rest timer HTML

}

function applyQuickToAll(kg){let i=0;while(true){const el=document.getElementById('log-kg-'+i);if(!el)break;el.value=kg;i++;}}
function savePR(cn){const v=parseFloat(document.getElementById('pr-inp')?.value);if(v>0){S.prs[cn]=String(v);save();closeModal();render();}}
function confirmLog(){
  const m=S.modal,allSets=m.allSets||[],r=ensureR(m.wn),cn=getCanon(m.liftName);
  function saveOne(sk,kg,reps){
    let isPR=false;
    if(cn&&PR_LIFTS.includes(cn)){
      const cur=parseFloat(S.prs[cn])||0;if(kg>cur){S.prs[cn]=String(kg);isPR=true;}
      if(!S.hist[cn])S.hist[cn]=[];
      const td=today(),ei=S.hist[cn].findIndex(x=>x.wodN===m.wn&&x.sk===sk);
      const entry={date:td,kg,reps,wodN:m.wn,sk};if(ei>=0)S.hist[cn][ei]=entry;else S.hist[cn].push(entry);
      const est=reps?epley(kg,reps):kg,cur2=S.maxLifts[cn];
      if(!cur2||est>epley(parseFloat(cur2.kg)||0,parseInt(cur2.reps)||1))S.maxLifts[cn]={kg,reps:reps||1};
    }
    r.sets[sk]={kg,r:reps,pr:isPR};
  }
  if(allSets.length>0){
    let saved=0;
    allSets.forEach((si,idx)=>{const kg=parseFloat(document.getElementById('log-kg-'+idx)?.value)||0,reps=parseInt(document.getElementById('log-reps-'+idx)?.value)||null;if(kg){saveOne(si.sk,kg,reps);saved++;}});
    if(!saved){alert('Enter at least one weight');return;}
  }else{
    const kg=parseFloat(document.getElementById('log-kg-0')?.value)||0,reps=parseInt(document.getElementById('log-reps-0')?.value)||null;
    if(!kg){alert('Enter a weight');return;}
    saveOne(m.sk,kg,reps);
  }
  save();
  // Auto-start rest timer
  window._restRemaining=window._restSecs;
  window._restRunning=false;
  startRestTimer();
  closeModal();render();
}

function onCondRx(wn,si,v){const r=ensureR(wn);if(!r.cond[si])r.cond[si]={score:'',rx:'Rx'};r.cond[si].rx=v;save();render();}

/* ── Complete WOD ── */
function completeWod(wn){
  const r=ensureR(wn);r.completedAt=today();
  if(!S.completedWods.includes(wn))S.completedWods.push(wn);
  let next=S.currentWod+1;
  while(next<WORKOUTS.length&&S.completedWods.includes(WORKOUTS[next].n))next++;
  S.currentWod=Math.min(next,WORKOUTS.length-1);
  save();go("today");
}

/* ── Build sections ── */
function buildSecs(w,expandMain){
  return w.sections.map((sec,i)=>{
    const cls=sec.cls,key=w.n+'-'+i,isMain=cls!=='wu'&&cls!=='cd';
    if(S.openSecs[key]===undefined)S.openSecs[key]=expandMain&&isMain;
    const open=S.openSecs[key],r=S.results[w.n]||{};
    let badge='';
    if(cls==='ft'||cls==='am'||cls==='em'){const c=(r.cond||{})[i];if(c&&c.score)badge='<span class="done-badge">✓ '+esc(c.score)+'</span>';}
    else if(LIFT_SEC_TYPES.has(cls)){const f=Object.keys(r.sets||{}).filter(k=>k.startsWith(i+'-')&&r.sets[k].kg).length;if(f)badge='<span class="done-badge">✓ '+f+'</span>';}
    else if(cls==='cr'){if((r.core||{})[i])badge='<span class="done-badge">✓</span>';}
    const fmtChip=sec.fmt?'<span class="sec-fmt '+chipC(cls)+'" style="font-size:9px">'+esc(sec.fmt)+'</span>':'';
    return '<div><div class="sec-hdr" data-key="'+key+'" data-def="'+isMain+'" onclick="toggleSecEl(this)"><div class="sec-dot d-'+cls+'"></div><div class="sec-name t-'+cls+'">'+esc(sec.h)+'</div>'+fmtChip+badge+'<div class="sec-arr'+(open?' open':'')+'" id="sa-'+key+'">▾</div></div><div class="sec-body'+(open?' open':'')+'" id="sb-'+key+'">'+buildSecContent(w,sec,i,cls)+'</div></div>';
  }).join('');
}

function buildSecContent(w,sec,si,cls){
  var wn=w.n,r=S.results[wn]||{};
  var itemsHtml=sec.lines.length?'<div class="sec-items">'+sec.lines.map(function(l){return '<div class="sec-item">'+esc(l)+'</div>';}).join('')+'</div>':'';
  var trackHtml='';
  if(LIFT_SEC_TYPES.has(cls)){
    // Regex for known lift names appearing as lines within a section
    var ILRE=/^(Back Squats?|Front Squats?|Overhead Squats?|Deadlifts?|Romanian Deadlifts?|Bench Presses?|Bench Press|Incline Bench Press|Close-Grip Bench Press|Shoulder Presses?|Shoulder Press|Push Press|Push Jerk|Split Jerk|Snatches?|Power Snatch|Hang Snatch|Clean & Jerk|Cleans?|Power Clean|Hang Clean|Thrusters?|Seated Dumbbell Presses?|Weighted Pull-ups?|Bar Dip)(\s*\+.*)?$/i;

    // 1. Detect inner lift names within section lines (e.g. "Deadlifts" inside a section)
    var innerLifts=[],curLift=null,curLines=[];
    sec.lines.forEach(function(l){
      if(ILRE.test(l.trim())&&l.trim().toLowerCase()!==sec.h.toLowerCase()){
        if(curLift!==null)innerLifts.push({name:curLift,lines:curLines});
        curLift=l.trim();curLines=[];
      }else if(curLift){curLines.push(l);}
    });
    if(curLift!==null)innerLifts.push({name:curLift,lines:curLines});

    // 2. Determine split names (section header parts + inner lifts)
    var splitNames=sec.h.split(/\s*\+\s*/).map(function(s){return s.trim();}).filter(Boolean);
    if(innerLifts.length>0){
      // Lines before first inner lift belong to the header lift
      var preLines=[];
      for(var _pi=0;_pi<sec.lines.length;_pi++){
        if(ILRE.test(sec.lines[_pi].trim())&&sec.lines[_pi].trim().toLowerCase()!==sec.h.toLowerCase())break;
        preLines.push(sec.lines[_pi]);
      }
      var preSetLines=preLines.filter(function(l){
        return /\d+\s*(reps?|steps?|sets?|%)/i.test(l)&&!/^(Weight|Rest|Perform|Goal|Note|Use|Add|Each|Score|Barbell)/i.test(l.trim())&&l.trim().length<80;
      });
      splitNames=[];
      if(preSetLines.length>0)splitNames.push(sec.h.split(/\s*\+\s*/)[0].trim());
      innerLifts.forEach(function(il){splitNames.push(il.name);});
    }

    // Helper: given a set of lines, detect "N sets of R1,R2,R3 reps" + "Weight: P1%,P2%,P3%"
    // and expand to individual set rows. Falls back to simple expansion otherwise.
    function expandSetLines(lines,extraLines){
      var allLines=extraLines?lines.concat(extraLines):lines;
      // Detect "N sets of R1, R2... reps" line
      var setsOfLine=null,weightLine=null;
      allLines.forEach(function(l){
        if(!setsOfLine&&/^\d+\s+sets?\s+of\s+[\d,\s]+reps?/i.test(l))setsOfLine=l;
        if(!weightLine&&/^Weight:\s*[\d.,\s%]+/i.test(l))weightLine=l;
      });
      if(setsOfLine){
        var rm=setsOfLine.match(/of\s+([\d,\s]+)\s*reps?/i);
        if(rm){
          var repsList=rm[1].split(',').map(function(x){return parseInt(x.trim());}).filter(function(x){return !isNaN(x);});
          var pctsList=weightLine?weightLine.match(/(\d+)%/g)||[]:[];
          pctsList=pctsList.map(function(p){return parseInt(p);});
          if(repsList.length>0){
            return repsList.map(function(reps,i){
              var pct=i<pctsList.length?pctsList[i]:null;
              return 'Set '+(i+1)+': '+reps+' reps'+(pct?' @ '+pct+'%':'');
            });
          }
        }
      }
      // Detect plain "N sets" line and expand
      var raw=lines.filter(function(l){
        return /\d+\s*(reps?|steps?|sets?|%)/i.test(l)
          &&!/^(Weight|Rest|Perform|Goal|Note|Use|Add|Each|Score|Barbell)/i.test(l.trim())
          &&l.trim().length<80;
      });
      var out=[];
      raw.forEach(function(l){
        var m=l.match(/^(\d+)\s+sets?$/i);
        if(m){for(var _s=1;_s<=parseInt(m[1]);_s++)out.push('Set '+_s);}
        else out.push(l);
      });
      return out;
    }

    // Default set lines from full section
    var defaultSetLines=expandSetLines(sec.lines,null);

    // 3. Build each lift block
    var blocksHtml=splitNames.map(function(blockName,bi){
      var cn=getCanon(blockName),pr=cn?parseFloat(S.prs[cn])||0:0;
      var extraKey='extra-'+si+'-'+bi;
      var extraCount=parseInt(((r.extraSets)||{})[extraKey])||0;

      // Determine set lines for this specific block
      var blockSetLines;
      if(innerLifts.length>0){
        var matched=innerLifts.find(function(il){return il.name===blockName;});
        if(matched){
          blockSetLines=expandSetLines(matched.lines,sec.lines);
          if(blockSetLines.length===0)blockSetLines=expandSetLines(sec.lines.slice(),null);
        }else{
          // Header lift — use lines before first inner lift
          var pre2=[];
          for(var _pi2=0;_pi2<sec.lines.length;_pi2++){
            if(ILRE.test(sec.lines[_pi2].trim())&&sec.lines[_pi2].trim().toLowerCase()!==sec.h.toLowerCase())break;
            pre2.push(sec.lines[_pi2]);
          }
          blockSetLines=expandSetLines(pre2,sec.lines);
        }
      }else{
        blockSetLines=defaultSetLines;
      }

      var allLabels=blockSetLines.slice();
      for(var ex=0;ex<extraCount;ex++)allLabels.push('Extra set '+(ex+1));

      var regKey=wn+':'+si+':'+bi;
      if(!window._liftReg)window._liftReg={};
      window._liftReg[regKey]=blockName;

      var setRows=allLabels.map(function(lbl,si2){
        var sk=si+'-'+bi+'-'+si2,sv=(r.sets||{})[sk]||{};
        var pct=pr&&sv.kg?Math.round(sv.kg/pr*100):0;
        return '<div class="set-row" data-rk="'+esc(regKey)+'" data-wn="'+wn+'" data-si="'+si+'" data-bi="'+bi+'" data-idx="'+si2+'" onclick="openSetModal(this)">'+
          '<div class="set-lbl">'+esc(lbl)+'</div>'+
          (sv.kg?'<span class="set-val">'+sv.kg+'kg</span>':'')+
          (sv.r?'<span class="set-reps">\xd7 '+sv.r+'</span>':'')+
          (sv.pr?'<span class="set-pr-tag pr-pop">\u2605 PR</span>':(pct?'<span class="set-pct-tag">'+pct+'%</span>':''))+
          '<span class="log-btn'+(sv.kg?' done':'')+'">'+( sv.kg?'Edit':'+ Log')+'</span>'+
        '</div>';
      }).join('');

      return '<div class="lift-block" style="margin-bottom:'+(bi<splitNames.length-1?'10':'0')+'px">'+
        '<div class="lift-name-bar">'+
          '<span class="lname">'+esc(blockName)+'</span>'+
          (pr?'<span style="font-size:11px;color:var(--muted)">PR <b style="color:var(--lime)">'+pr+'kg</b></span>':'')+
          '<button class="pct-btn" data-rk="'+esc(regKey)+'" onclick="event.stopPropagation();showPRModal((window._liftReg&&window._liftReg[this.dataset.rk])||this.dataset.rk)">% calc</button>'+
        '</div>'+
        (allLabels.length?setRows:'<div style="padding:10px 12px;font-size:12px;color:var(--muted)">No sets detected</div>')+
        '<div style="padding:7px 12px;border-top:1px solid var(--border)">'+
          '<button class="add-set-btn" data-wn="'+wn+'" data-key="'+esc(extraKey)+'" onclick="addExtraSet(parseInt(this.dataset.wn),this.dataset.key)">+ Add Set</button>'+
        '</div>'+
      '</div>';
    }).join('');

    trackHtml='<div class="track-wrap"><div class="track-lbl">Tap to log weight</div>'+blocksHtml+'</div>';

  }else if(cls==='ft'||cls==='am'||cls==='em'){
    var c=(r.cond||{})[si]||{},rx=c.rx||'Rx';
    trackHtml='<div class="track-wrap"><div class="track-lbl">Log result</div>'+
      '<div class="cond-track">'+
        '<input class="score-inp" type="text" placeholder="Time, rounds, reps\u2026" value="'+esc(c.score||'')+'" oninput="onCondScore('+wn+','+si+',this.value)">'+
        '<div class="rx-row">'+['Rx','Scaled','Rx+'].map(function(v){return '<button class="rx-btn'+(rx===v?' on':'')+'" data-v="'+v+'" onclick="onCondRx('+wn+','+si+',this.dataset.v)">'+v+'</button>';}).join('')+'</div>'+
      '</div></div>';
  }else if(cls==='cr'){
    var note=(r.core||{})[si]||'';
    trackHtml='<div class="track-wrap"><div class="track-lbl">Notes</div>'+
      '<textarea class="core-inp" rows="2" placeholder="Rounds, modifications\u2026" oninput="onCore('+wn+','+si+',this.value)">'+esc(note)+'</textarea></div>';
  }
  return itemsHtml+trackHtml;
}

function addExtraSet(wn,extraKey){
  var r=ensureR(wn);if(!r.extraSets)r.extraSets={};
  r.extraSets[extraKey]=(parseInt(r.extraSets[extraKey])||0)+1;
  save();render();
}
function removeExtraSet(wn,extraKey){
  var r=ensureR(wn);if(!r.extraSets)return;
  var cur=parseInt(r.extraSets[extraKey])||0;
  if(cur>0)r.extraSets[extraKey]=cur-1;

}

function openSetModal(el){
  var wn=parseInt(el.dataset.wn),si=parseInt(el.dataset.si),bi=parseInt(el.dataset.bi),tappedIdx=parseInt(el.dataset.idx);
  var liftName=(window._liftReg&&window._liftReg[el.dataset.rk])||el.dataset.rk||'';
  var w=WORKOUTS.find(function(x){return x.n===wn;});if(!w)return;
  var sec=w.sections[si];if(!sec)return;
  var r=S.results[wn]||{};
  var setLines=sec.lines.filter(function(l){return /\d+\s*(reps?|steps?|sets?|%)/i.test(l);});
  var extraKey='extra-'+si+'-'+bi;
  var extraCount=parseInt(((r.extraSets)||{})[extraKey])||0;
  var allLabels=setLines.slice();
  for(var ex=0;ex<extraCount;ex++)allLabels.push('Extra set '+(ex+1));
  var allSets=allLabels.map(function(lbl,i){return {sk:si+'-'+bi+'-'+i,lbl:lbl};});
  S.modal={type:'log',wn:wn,sk:si+'-'+bi+'-'+tappedIdx,lbl:allLabels[tappedIdx]||'Set',liftName:liftName,allSets:allSets,_si:si,_bi:bi};
  renderModal();
}


function render(){
  const cur=Math.min(S.currentWod,WORKOUTS.length-1);
  document.getElementById('prog-pill').textContent='WOD '+WORKOUTS[cur].n+' OF '+WORKOUTS.length;
  const a=document.getElementById('area');
  if(S.page==='today')renderToday(a);
  else if(S.page==='wods')renderWods(a);
  else if(S.page==='detail')renderDetail(a);
  else if(S.page==='lifts')renderLifts(a);
  else if(S.page==='calc')renderCalc(a);
  else if(S.page==='settings')renderSettings(a);
  renderModal();
}

function renderToday(a){
  const total=WORKOUTS.length;
  if(S.currentWod>=total){a.innerHTML='<div style="padding:48px 20px;text-align:center"><div style="font-size:52px;margin-bottom:14px">🏆</div><div style="font-family:Bebas Neue,cursive;font-size:36px;color:var(--lime)">PROGRAM COMPLETE!</div></div>';return;}
  const w=WORKOUTS[S.currentWod],r=S.results[w.n]||{};
  const done=S.completedWods.includes(w.n),pct=Math.round(S.currentWod/total*100);
  a.innerHTML='<div style="padding:14px 16px 12px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;font-weight:700">Next Workout</span><span style="font-size:11px;color:var(--muted)">'+S.completedWods.length+' / '+total+' done</span></div><div class="pbar"><div class="pbar-fill" style="width:'+pct+'%"></div></div></div><div style="padding:0 16px 8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span class="chip '+chipC(w.type)+'">'+chipL(w.type)+'</span><span style="font-size:11px;color:var(--muted);font-family:DM Mono,monospace">WOD '+w.n+'</span></div><div style="padding:0 16px 14px;font-family:Bebas Neue,cursive;font-size:32px;color:var(--text);letter-spacing:.5px;line-height:1.1">'+esc(w.title)+'</div><div style="background:var(--s2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:14px">'+buildSecs(w,true)+'</div><div style="padding:0 16px 12px"><div style="font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:6px;font-weight:700">SESSION NOTES</div><textarea class="inp" rows="2" placeholder="General notes…" oninput="onNotes('+w.n+',this.value)">'+esc(r.notes||'')+'</textarea></div><div style="padding:0 16px 28px">'+(done?'<div style="text-align:center;color:var(--green);font-family:Bebas Neue,cursive;font-size:18px;margin-bottom:10px;letter-spacing:1px">✓ Completed '+esc(r.completedAt||'')+'</div><div style="display:flex;gap:8px;margin-top:4px"><button class="btn-ghost" style="flex:1;color:var(--muted)" onclick="revertWod('+w.n+')">&#8617; Revert</button><button class="btn-ghost" style="flex:1" onclick="S.currentWod=Math.min(S.currentWod+1,WORKOUTS.length-1);save();render()">Next &#8594;</button></div>':'<button class="btn-lime" onclick="completeWod('+w.n+')">MARK COMPLETE → NEXT WORKOUT</button>')+'</div>';
}

function renderWods(a){
  function getWeekStart(offset){
    var n=new Date(),dow=n.getDay(),m=new Date(n);
    m.setDate(n.getDate()-((dow+6)%7)+(offset*7));m.setHours(0,0,0,0);return m;
  }
  var dateToWod={};
  for(var wn in S.results){var r2=S.results[wn];if(r2.completedAt)dateToWod[r2.completedAt]=parseInt(wn);}
  var ws=getWeekStart(S.weekOffset),ts=today(),DN=['M','T','W','T','F','S','S'];
  var cells=Array.from({length:7},function(_,i){
    var d=new Date(ws);d.setDate(ws.getDate()+i);
    var ds2=String(d.getDate()).padStart(2,'0')+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+d.getFullYear();
    var isT=ds2===ts,wn2=dateToWod[ds2],has=wn2!==undefined;
    var bg=has?'var(--lime)':isT?'var(--s2)':'var(--s3)';
    var tc=has?'#0a0a0a':isT?'var(--lime)':'var(--muted)';
    var border=isT&&!has?'2px solid var(--lime)':'1px solid var(--border)';
    return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 3px;border-radius:10px;background:'+bg+';border:'+border+';cursor:'+(has?'pointer':'default')+'"'+(has?' onclick="jumpToWod('+wn2+')"':'')+'>'+
      '<div style="font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:'+(has?'rgba(0,0,0,.55)':isT?'var(--lime)':'var(--muted)')+'">'+DN[i]+'</div>'+
      '<div style="font-family:Bebas Neue,cursive;font-size:18px;line-height:1;color:'+tc+'">'+d.getDate()+'</div>'+
      '<div style="width:5px;height:5px;border-radius:50%;background:'+(has?'rgba(0,0,0,.3)':'transparent')+'"></div>'+
    '</div>';
  }).join('');
  var we=new Date(ws);we.setDate(ws.getDate()+6);
  var MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var wlbl=ws.getMonth()===we.getMonth()?MO[ws.getMonth()]+' '+ws.getFullYear():MO[ws.getMonth()]+' – '+MO[we.getMonth()]+' '+we.getFullYear();
  var cal='<div style="background:var(--s1);border-bottom:1px solid var(--border);padding:10px 16px 12px;position:sticky;top:0;z-index:5">'+
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'+
      '<button onclick="prevWeek()" style="background:var(--s3);border:1px solid var(--border);border-radius:8px;padding:5px 12px;color:var(--text);font-size:16px;cursor:pointer">‹</button>'+
      '<span style="font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.5px">'+wlbl+'</span>'+
      '<button onclick="nextWeek()" style="background:var(--s3);border:1px solid var(--border);border-radius:8px;padding:5px 12px;color:var(--text);font-size:16px;cursor:pointer">›</button>'+
    '</div>'+
    '<div style="display:flex;gap:5px">'+cells+'</div>'+
  '</div>';
  var rows=WORKOUTS.map(function(w,idx){
    var done=S.completedWods.includes(w.n),isCur=idx===S.currentWod;
    var sl=w.sections.filter(function(s){return s.cls!=='wu'&&s.cls!=='cd';}).map(function(s){return s.h;}).join(' · ');
    var ds3=S.results[w.n]&&S.results[w.n].completedAt?S.results[w.n].completedAt:'';
    return '<div id="wod-row-'+w.n+'" style="margin:0 16px 10px;background:var(--s2);border:1px solid '+(isCur?'var(--lime)':done?'rgba(60,255,160,.15)':'var(--border)')+';border-radius:14px;padding:14px;cursor:pointer;opacity:'+(done&&!isCur?'0.55':'1')+'" onclick="openDetail('+idx+')">'+
      '<div style="display:flex;align-items:center;gap:7px;margin-bottom:8px;flex-wrap:wrap">'+
        '<span class="chip '+chipC(w.type)+'">'+chipL(w.type)+'</span>'+
        '<span style="font-size:11px;color:var(--muted);font-family:DM Mono,monospace">WOD '+w.n+'</span>'+
        (isCur?'<span style="margin-left:auto;font-size:10px;color:var(--lime);font-weight:700;letter-spacing:1px">NEXT UP</span>':'')+
        (done&&!isCur?'<span class="done-badge" style="margin-left:auto">✓ '+esc(ds3)+'</span>':'')+
      '</div>'+
      '<div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px">'+esc(w.title.slice(0,52))+'</div>'+
      '<div style="font-size:11px;color:var(--muted)">'+esc(sl.slice(0,80))+'</div>'+
    '</div>';
  }).join('');
  a.innerHTML='<div>'+cal+'<div style="padding-top:12px"><div class="hdr">'+WORKOUTS.length+' WORKOUTS · '+S.completedWods.length+' DONE</div>'+rows+'</div></div>';
}

function renderDetail(a){
  const w=WORKOUTS[S.detail],done=S.completedWods.includes(w.n),r=S.results[w.n]||{};
  a.innerHTML='<div><div style="padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)"><button class="btn-back" onclick="goWods()">&#8592; Back</button><span style="font-family:Bebas Neue,cursive;font-size:18px;color:var(--text)">WOD '+w.n+'</span>'+(done?'<span class="done-badge" style="margin-left:auto">✓ Done</span>':'')+'</div><div style="padding:10px 16px 6px;display:flex;gap:8px;align-items:center;flex-wrap:wrap"><span class="chip '+chipC(w.type)+'">'+chipL(w.type)+'</span></div><div style="padding:2px 16px 12px;font-family:Bebas Neue,cursive;font-size:28px;color:var(--text)">'+esc(w.title)+'</div><div style="background:var(--s2);border-top:1px solid var(--border);border-bottom:1px solid var(--border)">'+buildSecs(w,true)+'</div><div style="padding:14px 16px 24px"><div style="font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:8px;font-weight:700">SESSION NOTES</div><textarea class="inp" rows="2" placeholder="General notes…" oninput="onNotes('+w.n+',this.value)" style="margin-bottom:12px">'+esc(r.notes||'')+'</textarea>'+(!done?'<button class="btn-lime" onclick="completeWod('+w.n+')">MARK COMPLETE</button>':'<div style="text-align:center;color:var(--green);font-size:13px;padding:6px;font-weight:600">✓ Completed '+esc(r.completedAt||'')+'</div><button class="btn-ghost" style="width:100%;margin-top:8px;color:var(--muted)" onclick="revertWod('+w.n+')">&#8617; Mark as Incomplete</button>')+'</div></div>';
}

function renderLifts(a){
  const rows=PR_LIFTS.map(name=>{
    const maxL=S.maxLifts[name]||null;
    const est1rm=maxL&&maxL.kg?epley(parseFloat(maxL.kg)||0,parseInt(maxL.reps)||1):0;
    const dispPR=est1rm||parseFloat(S.prs[name])||0;
    const hist=(S.hist[name]||[]).slice(-5).reverse();
    const pctPills=dispPR?'<div class="pct-pills">'+[90,80,70,60,50].map(p=>{const kg=rnd(dispPR*p/100);return '<div class="pct-pill"><div class="pct-pill-p">'+p+'%</div><div class="pct-pill-kg">'+kg+'</div></div>';}).join('')+'</div>':'';
    const histH=hist.length?'<div class="hist-rows"><div class="hist-row-lbl">RECENT SETS</div>'+hist.map(h=>{const est=h.reps?epley(h.kg,h.reps):h.kg,isBest=est>=dispPR&&dispPR>0,pct=dispPR?Math.round(h.kg/dispPR*100):0;return '<div class="hist-row"><span class="hist-date">'+h.date+'</span><span class="hist-val">'+h.kg+'kg × '+(h.reps||'?')+' → ~'+est+'kg</span><span class="hist-badge '+(isBest?'pr':'pct')+'">'+(isBest?'★ BEST':pct+'%')+'</span></div>';}).join('')+'</div>':'';
    const empty=!dispPR&&!hist.length;
    return '<div class="lift-pr-card"><div class="lift-pr-header"><div class="lift-pr-name">'+esc(name)+'</div><div class="lift-pr-inputs"><input class="best-set-inp" type="number" inputmode="decimal" placeholder="—" value="'+esc(maxL&&maxL.kg?maxL.kg:'')+'" data-n="'+esc(name)+'" data-f="kg" onchange="updateMaxLift(this.dataset.n,this.dataset.f,this.value)"><span class="lift-pr-x">×</span><input class="best-set-inp" type="number" inputmode="decimal" placeholder="—" value="'+esc(maxL&&maxL.reps?maxL.reps:'')+'" data-n="'+esc(name)+'" data-f="reps" onchange="updateMaxLift(this.dataset.n,this.dataset.f,this.value)"></div><div class="lift-pr-orm">'+(dispPR?dispPR+'<span class="lift-pr-orm-unit"> kg</span>':'&mdash;')+'</div></div>'+(dispPR||hist.length?'<div class="lift-pr-body">'+pctPills+histH+'</div>':(empty?'<div class="lift-pr-body"><div style="font-size:12px;color:var(--muted);padding:2px 0 6px">Enter your best set above to see percentages</div></div>':''))+'</div>';
  }).join('');
  a.innerHTML='<div><div class="hdr">PERSONAL RECORDS (KG)</div>'+rows+'</div>';
}
function setPR(name,val){S.prs[name]=val;save();}
function updateMaxLift(name,field,val){
  if(!S.maxLifts[name])S.maxLifts[name]={kg:'',reps:''};
  S.maxLifts[name][field]=parseFloat(val)||'';
  const ml=S.maxLifts[name];
  if(ml.kg){const est=epley(parseFloat(ml.kg)||0,parseInt(ml.reps)||1);if(est>0)S.prs[name]=String(est);}
  save();render();
}

function renderCalc(a){
  const w=parseFloat(S.calcW),r=parseInt(S.calcR)||0,orm=(w&&r>0)?epley(w,r):0;
  const pcts=[100,95,90,85,80,75,70,65,60,55,50];
  const grid=pcts.map(p=>{const v=orm?rnd(orm*p/100):'&mdash;';return '<div class="pct-cell '+(p===80?'hl':'')+'"><div class="pp">'+p+'%</div><div class="pw">'+v+(orm?'<span style="font-size:14px"> kg</span>':'')+'</div>'+(orm?'<div class="plb">'+Math.round(orm*p/100*2.2046)+' lb</div>':'')+'</div>';}).join('');
  a.innerHTML='<div><div class="hdr">1RM CALCULATOR (EPLEY)</div><div style="padding:0 16px 24px"><div style="background:var(--s2);border:1px solid var(--border);border-radius:16px;text-align:center;padding:22px 20px;margin-bottom:14px"><div style="font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:6px;font-weight:700">ESTIMATED 1RM</div><div style="font-family:Bebas Neue,cursive;font-size:72px;color:var(--lime);line-height:1">'+(orm||'&mdash;')+'</div><div style="font-size:12px;color:var(--muted);margin-top:4px">'+(orm?orm+' kg · '+Math.round(orm*2.2046)+' lb':'enter weight &amp; reps below')+'</div></div><div class="row" style="margin-bottom:20px"><div style="flex:2"><div style="font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:6px;font-weight:700">WEIGHT (KG)</div><input id="calc-w" type="number" inputmode="decimal" class="inp" placeholder="100" value="'+esc(S.calcW)+'" oninput="S.calcW=this.value;renderCalcOnly()" style="font-size:20px;font-family:DM Mono,monospace"></div><div style="flex:1"><div style="font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:6px;font-weight:700">REPS</div><input id="calc-r" type="number" inputmode="decimal" class="inp" placeholder="5" value="'+esc(S.calcR)+'" oninput="S.calcR=this.value;renderCalcOnly()" style="font-size:20px;font-family:DM Mono,monospace"></div></div><div style="font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:10px;font-weight:700">PERCENTAGES</div><div class="pct-grid" id="calc-grid">'+grid+'</div></div></div>';
}
function renderCalcOnly(){
  const w=parseFloat(S.calcW),r=parseInt(S.calcR)||0,orm=(w&&r>0)?epley(w,r):0;
  const pcts=[100,95,90,85,80,75,70,65,60,55,50];
  const g=document.getElementById('calc-grid');
  if(g)g.innerHTML=pcts.map(p=>{const v=orm?rnd(orm*p/100):'&mdash;';return '<div class="pct-cell '+(p===80?'hl':'')+'"><div class="pp">'+p+'%</div><div class="pw">'+v+(orm?'<span style="font-size:14px"> kg</span>':'')+'</div>'+(orm?'<div class="plb">'+Math.round(orm*p/100*2.2046)+' lb</div>':'')+'</div>';}).join('');
  const big=document.querySelector('#area [style*="font-size:72px"]');if(big)big.innerHTML=orm||'&mdash;';
  const sub=document.querySelector('#area [style*="margin-top:4px"]');if(sub)sub.innerHTML=orm?orm+' kg · '+Math.round(orm*2.2046)+' lb':'enter weight &amp; reps below';
}

function renderSettings(a){
  const done=S.completedWods.length,total=WORKOUTS.length,curWod=WORKOUTS[Math.min(S.currentWod,total-1)];
  const signedIn=!!(window._fbUser);
  const syncRow='<div class="setting-row"><div><div class="setting-lbl">Cloud Sync</div><div class="setting-sub">'+(signedIn?'Signed in as '+esc(window._fbUser.displayName):'Not signed in - tap to sync across devices')+'</div></div><button class="btn-ghost" onclick="handleAuth()" style="font-size:12px;padding:8px 14px;'+(signedIn?'':'color:var(--lime);border-color:rgba(200,241,53,.4)')+'">'+( signedIn?'Sign Out':'Sign In')+'</button></div>';
  a.innerHTML='<div><div class="hdr">SETTINGS</div>'+syncRow+'<div class="setting-row"><div><div class="setting-lbl">Progress</div><div class="setting-sub">Workouts completed</div></div><span class="setting-val">'+done+' / '+total+'</span></div><div class="setting-row"><div><div class="setting-lbl">Next Up</div><div class="setting-sub">'+esc(curWod.title.slice(0,34))+'</div></div><span class="setting-val">WOD '+curWod.n+'</span></div><div class="setting-row"><div><div class="setting-lbl">Remaining</div></div><span class="setting-val">'+(total-done)+'</span></div><div class="setting-row"><div><div class="setting-lbl">Weight Unit</div></div><span style="font-size:14px;color:var(--lime);font-weight:700;letter-spacing:1px">KILOGRAMS</span></div><div style="padding:16px 16px 10px"><div style="font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:10px;font-weight:700">JUMP TO WORKOUT</div><div class="row"><input id="ji" type="number" class="inp" placeholder="WOD number 1 – '+total+'" style="font-size:16px"><button class="btn-ghost" onclick="doJump()">Go</button></div></div><div style="padding:4px 16px 24px"><button class="btn-ghost" style="width:100%;padding:13px;color:var(--red);border-color:rgba(255,69,69,.25);font-size:13px" onclick="resetAll()">Reset All Data</button></div></div>';
}
function handleAuth(){
  if(window._fbUser){
    if(confirm('Sign out of '+window._fbUser.displayName+'?')){
      // iOS native sign out
      if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.signOut){
        window.webkit.messageHandlers.signOut.postMessage({});
      } else if(window._fbSignOut){
        window._fbSignOut();
      }
    }
  }else{
    // iOS native sign in
    if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.signIn){
      window.webkit.messageHandlers.signIn.postMessage({});
    } else if(window._fbSignIn){
      window._fbSignIn().catch(function(e){
        if(e.code!=='auth/popup-closed-by-user')alert('Sign in failed: '+e.message);
      });
    } else {
      alert('Auth not loaded yet, please wait a moment and try again.');
    }
  }
}

// Called by native iOS after successful Google Sign-In
window._onNativeSignIn = function(uid, name, photo){
  window._fbUser = {uid:uid, displayName:name, photoURL:photo};
  // Load cloud data for this user
  if(window._fbDb&&window._fbDoc&&window._fbGetDoc){
    window._fbGetDoc(window._fbDoc(window._fbDb,'users',uid)).then(function(snap){
      if(snap.exists()&&window._applyCloudData) window._applyCloudData(snap.data());
      else render();
    }).catch(function(){ render(); });
  } else {
    render();
  }
  if(window._updateAuthUI) window._updateAuthUI();
};

// Called by native iOS after sign out
window._onNativeSignOut = function(){
  window._fbUser = null;
  if(window._updateAuthUI) window._updateAuthUI();
  render();
};

window._updateAuthUI = function(){
  const btn=document.getElementById('auth-btn');
  if(!btn)return;
  if(window._fbUser){
    // Signed in — show initial in lime circle
    const name=window._fbUser.displayName||'?';
    const initial=name[0].toUpperCase();
    btn.innerHTML='<div style="width:22px;height:22px;border-radius:50%;background:var(--lime);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#0a0a0a;flex-shrink:0">'+initial+'</div><span style="font-size:10px;font-weight:700;color:var(--lime);letter-spacing:.5px">SYNCED</span>';
    btn.style.cssText='cursor:pointer;height:30px;border-radius:20px;background:var(--limefaint);border:1px solid rgba(200,241,53,.35);display:flex;align-items:center;justify-content:center;gap:5px;padding:0 10px;flex-shrink:0';
    btn.title='Signed in as '+name+' (tap to sign out)';
  }else{
    // Signed out — subtle sync icon + text
    btn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0115-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 01-15 6.7L3 16"/></svg><span style="font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.5px">SYNC</span>';
    btn.style.cssText='cursor:pointer;height:30px;border-radius:20px;background:var(--s3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:5px;padding:0 10px;flex-shrink:0';
    btn.title='Sign in with Google to sync across devices';
  }
  render();
};

function doJump(){const v=parseInt(document.getElementById('ji')?.value);if(v>=1&&v<=WORKOUTS.length){const idx=WORKOUTS.findIndex(w=>w.n===v);if(idx>=0){S.currentWod=idx;save();go("today");}}}

// Decode workout data async so splash renders immediately
setTimeout(function(){
  try{
    WORKOUTS=JSON.parse(atob(_RAW));
  }catch(e){console.error("Failed to parse workouts",e);}
  load().then(function(){
    render();
    const splash=document.getElementById('splash');
    if(splash){splash.style.opacity='0';setTimeout(function(){splash.style.display='none';},400);}
  });
},50);

</script>
</body>
</html>
